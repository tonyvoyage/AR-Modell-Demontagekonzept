<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AR Modell Demontagekonzept</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: #111;
      height: 100vh;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }

    #loader-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      z-index: 9999;
    }

    .loader {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 10px solid #D4F9FF;
      border-top: 10px solid #004752;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

#custom-ar-button {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 90px;
  border-radius: 999px;
  border: none;
  background: #004752;
  color: white;
  font-size: 30px;
  font-weight: bold;
  z-index: 99999;
}
  </style>
</head>

<body>

  <div id="loader-wrapper">
    <div class="loader"></div>
  </div>

  <model-viewer
      id="viewer"
      src="Demontagekonzept_Anfangszustand.glb"
      ios-src="Demontagekonzept_Anfangszustand.glb"
      ar
      ar-modes="scene-viewer webxr quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      alt="3D Modell"
      poster="preview-demontagekonzept.jpeg">

  </model-viewer>

<button id="custom-ar-button">
  Bei mir ansehen
</button>

  <script>
     const viewer = document.getElementById("viewer");
  const loader = document.getElementById("loader-wrapper");

  viewer.addEventListener("load", () => {
    setTimeout(() => {
      loader.style.display = "none";
    }, 1000);
  });
document.getElementById("custom-ar-button").addEventListener("click", () => {
  viewer.activateAR();
});
  </script>

</body>
</html>
