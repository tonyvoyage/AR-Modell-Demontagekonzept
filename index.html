<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AR Modell Demontagekonzept</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: #111;
      height: 100vh;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }

    #loader-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      z-index: 9999;
    }

    .loader {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 10px solid #D4F9FF;
      border-top: 10px solid #004752;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
#reset-view-button {
  position: fixed;
  top: 18px;
  right: 18px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  background: #004752;
  color: white;
  font-size: 24px;
  font-weight: bold;
  z-index: 99999;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
}
  </style>
</head>

<body>

  <div id="loader-wrapper">
    <div class="loader"></div>
  </div>

  <model-viewer
    id="viewer"
    src="Demontagekonzept_Anfangszustand.glb"
    ios-src="Demontagekonzept_Anfangszustand.glb"
    camera-controls
    shadow-intensity="1"
    alt="3D Modell"
    poster="preview-demontagekonzept.jpeg"
    interaction-prompt="none"
    touch-action="none"
    camera-target="auto auto auto"
    camera-orbit="0deg 75deg 80%"
min-camera-orbit="auto auto 10%"
max-camera-orbit="auto auto 100%"
field-of-view="45deg"
min-field-of-view="25deg"
max-field-of-view="60deg"

  </model-viewer>

<button id="reset-view-button">↺</button>

  <script>
  const viewer = document.getElementById("viewer");
  const loader = document.getElementById("loader-wrapper");

  viewer.addEventListener("load", () => {
    setTimeout(() => {
      loader.style.display = "none";
    }, 1000);
  });

let rotateTimeout;

function startAutoRotate() {
  viewer.autoRotate = true;
}

function stopAutoRotate() {

  viewer.autoRotate = false;

  clearTimeout(rotateTimeout);

  rotateTimeout = setTimeout(startAutoRotate, 10000);
}

viewer.addEventListener("camera-change", stopAutoRotate);

startAutoRotate();

const resetButton = document.getElementById("reset-view-button");

resetButton.addEventListener("click", () => {
  viewer.cameraOrbit = "0deg 75deg 40m";
  viewer.cameraTarget = "auto auto auto";
  viewer.fieldOfView = "15deg";
}); 
</script>

</body>
</html>
