<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AR Modell Demontagekonzept</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: #111;
      height: 100vh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<model-viewer
    src="Demontagekonzept_Anfangszustand.glb" 
    ios-src="Demontagekonzept_Anfangszustand.glb"
    ar
    ar-modes="scene-viewer webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="3D Modell"
    poster="preview-demontagekonzept.jpeg">
</model-viewer>

</body>
</html>
